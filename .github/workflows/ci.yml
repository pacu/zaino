name: CI - PR

on:
  workflow_call:
    inputs:
      nextest-profile:
        type: string
        default: 'quick'
  workflow_dispatch:
  push:
    tags:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
  AWS_REGION: us-east-1
  CACHE_ENDPOINT: gh-cache-hl.minio-tenants.svc.cluster.local
  CACHE_PORT: 9000
  CACHE_BUCKET: gha-cache-bucket
  INSECURE_CACHE: true

jobs:
  hadolint:
    name: Hadolint
    # Runs on a GitHub-hosted runner (not the self-hosted arc-sh-runners) so it
    # executes on pull requests, unlike the build/test jobs below which are
    # skipped on PRs until a self-hosted runner is available. The hadolint
    # image is pinned by digest for supply-chain integrity; .hadolint.yaml at
    # the repo root sets the policy (DL3008 apt-version pinning is enforced).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfiles
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            --entrypoint hadolint \
            hadolint/hadolint:v2.14.0@sha256:27086352fd5e1907ea2b934eb1023f217c5ae087992eb59fde121dce9c9ff21e \
            Dockerfile integration-tests/test_environment/Containerfile

  fmt:
    name: Rustfmt
    # Runs on a GitHub-hosted runner (not the self-hosted arc-sh-runners) so it
    # executes on pull requests, unlike the build/test jobs below which are
    # skipped on PRs until a self-hosted runner is available. cargo fmt
    # auto-installs the toolchain and rustfmt component pinned in
    # rust-toolchain.toml on first use.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check formatting
        run: cargo fmt --all -- --check
        
  compute-tag:
    uses: ./.github/workflows/compute-tag.yml

  build-test-artifacts:
    name: Build test artifacts
    needs: compute-tag
    container:
      image: docker.io/zingodevops/zaino-ci:${{ needs.compute-tag.outputs.image-tag }}
    runs-on: arc-sh-runners
    # Skip on PRs until self-hosted runner is available
    if: github.event_name != 'pull_request' && github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore cargo dependencies
        id: restore-cargo
        uses: tespkg/actions-cache/restore@v1
        with:
          endpoint: ${{ env.CACHE_ENDPOINT }}
          port: ${{ env.CACHE_PORT }}
          bucket: ${{ env.CACHE_BUCKET }}
          insecure: ${{ env.INSECURE_CACHE }}
          key: cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-deps-
          path: |
            ~/.cargo
            target/debug/deps

      - name: Build and archive tests
        run: cargo nextest archive --verbose --workspace --all-features --archive-file nextest-archive.tar.zst

      - name: Save cargo dependencies
        if: steps.restore-cargo.outputs.cache-hit != 'true'
        uses: tespkg/actions-cache/save@v1
        with:
          endpoint: ${{ env.CACHE_ENDPOINT }}
          port: ${{ env.CACHE_PORT }}
          bucket: ${{ env.CACHE_BUCKET }}
          insecure: ${{ env.INSECURE_CACHE }}
          key: cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo
            target/debug/deps

      - name: Save nextest archive to S3
        uses: tespkg/actions-cache/save@v1
        with:
          endpoint: ${{ env.CACHE_ENDPOINT }}
          port: ${{ env.CACHE_PORT }}
          bucket: ${{ env.CACHE_BUCKET }}
          insecure: ${{ env.INSECURE_CACHE }}
          key: nextest-archive-${{ github.sha }}
          path: nextest-archive.tar.zst

  test:
    name: Tests
    needs: [compute-tag, build-test-artifacts]
    runs-on: arc-sh-runners
    container:
      image: docker.io/zingodevops/zaino-ci:${{ needs.compute-tag.outputs.image-tag }}
    strategy:
      fail-fast: false
      matrix:
        partition:
          # - "integration-tests::chain_cache" FIXME: this must be reintroduced when the chain index test hangs are debugged
          - "integration-tests::fetch_service"
          - "integration-tests::json_server"
          - "integration-tests::state_service"
          - "integration-tests::test_vectors"
          - "integration-tests::wallet_to_validator"
          - "zainod"
          - "zaino-state"
          - "zaino-testutils"
    steps:
      - uses: actions/checkout@v4

      - name: Restore cargo dependencies
        uses: tespkg/actions-cache/restore@v1
        with:
          endpoint: ${{ env.CACHE_ENDPOINT }}
          port: ${{ env.CACHE_PORT }}
          bucket: ${{ env.CACHE_BUCKET }}
          insecure: ${{ env.INSECURE_CACHE }}
          key: cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-deps-
          path: |
            ~/.cargo
            target/debug/deps

      - name: Setup test binaries
        run: |
          # Run the entrypoint script with the actual working directory
          /usr/local/bin/entrypoint.sh "$(pwd)"

      - name: Restore nextest archive from S3
        uses: tespkg/actions-cache/restore@v1
        with:
          endpoint: ${{ env.CACHE_ENDPOINT }}
          port: ${{ env.CACHE_PORT }}
          bucket: ${{ env.CACHE_BUCKET }}
          insecure: ${{ env.INSECURE_CACHE }}
          key: nextest-archive-${{ github.sha }}
          path: nextest-archive.tar.zst

      - name: Run Tests (Nextest)
        env:
          TEST_BINARIES_DIR: ${{ github.workspace }}/integration-tests/test_binaries/bins
        run: |
          cargo nextest run --verbose --profile ${{ inputs.nextest-profile || 'quick' }} --retries 2 --no-tests fail --archive-file nextest-archive.tar.zst \
            --workspace-remap ./ --filterset "binary_id(${{ matrix.partition }})" ${{ env.NEXTEST-FLAGS }}

      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "target/nextest/${{ inputs.nextest-profile || 'quick' }}/junit.xml"
