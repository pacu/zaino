name: Zaino Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push the built image to DockerHub. Set false to verify build on a feature branch without publishing.'
        type: boolean
        default: true

jobs:
  docker:
    name: Docker images (build+push)
    runs-on: ubuntu-latest
    env:
      # Push only on tag-push events, or when workflow_dispatch with input.push=true.
      PUSH_IMAGES: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Determine Rust version from rust-toolchain.toml
        run: |
          echo "RUST_VERSION=$(./tools/scripts/get-rust-version.sh)" >> $GITHUB_ENV

      - name: Extract metadata for Docker (default image)
        id: meta-default
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKER_RELEASE_REPO || 'zaino' }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Build and Push Default Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ env.PUSH_IMAGES }}
          tags: ${{ steps.meta-default.outputs.tags }}
          labels: ${{ steps.meta-default.outputs.labels }}
          build-args: |
            RUST_VERSION=${{ env.RUST_VERSION }}
          cache-from: |
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKER_RELEASE_REPO || 'zaino' }}:buildcache
            type=gha
          cache-to: |
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKER_RELEASE_REPO || 'zaino' }}:buildcache,mode=max
            type=gha,mode=max

      - name: Extract metadata for Docker (no-tls image)
        id: meta-no-tls
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKER_RELEASE_REPO || 'zaino' }}
          flavor: |
            suffix=-no-tls
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Build and Push No-TLS Image
        uses: docker/build-push-action@v5
        with:
          build-args: |
            NO_TLS=true
            RUST_VERSION=${{ env.RUST_VERSION }}
          context: .
          platforms: linux/amd64
          push: ${{ env.PUSH_IMAGES }}
          tags: "${{ steps.meta-no-tls.outputs.tags }}"
          labels: ${{ steps.meta-no-tls.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKER_RELEASE_REPO || 'zaino' }}:buildcache-no-tls
            type=gha
          cache-to: |
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKER_RELEASE_REPO || 'zaino' }}:buildcache-no-tls,mode=max
            type=gha,mode=max

  create-release:
    needs: docker
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Only create a GitHub release when triggered by a real semver tag push.
    # workflow_dispatch (e.g. for verification on a feature branch) skips this.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"* %s" > CHANGELOG.md
          else
            git log --pretty=format:"* %s" $PREVIOUS_TAG..HEAD > CHANGELOG.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CHANGELOG.md
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc.') }}
          token: ${{ secrets.GITHUB_TOKEN }}
