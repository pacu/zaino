'''

[tasks.base-script]
script.pre = '''
source "./.utils/helpers.sh"
TAG=$(./.utils/get-ci-image-tag.sh)

# Generic cleanup function for containers
podman_cleanup() {
    # Prevent running cleanup twice
    if [ "${CLEANUP_RAN:-0}" -eq 1 ]; then
        return
    fi
    CLEANUP_RAN=1

    # Check if we're cleaning up due to interruption
    if [ "$?" -eq 130 ] || [ "$?" -eq 143 ]; then
        echo ""
        warn "Task '${CARGO_MAKE_CURRENT_TASK_NAME}' interrupted! Cleaning up..."
    fi

    # Kill all child processes
    local pids=$(jobs -pr)
    if [ -n "$pids" ]; then
        kill $pids 2>/dev/null || true
    fi

    # Stop any containers started by this script
    if [ -n "${CONTAINER_ID:-}" ]; then
        info "Stopping container..."
        podman stop "$CONTAINER_ID" >/dev/null 2>&1 || true
    fi

    # Also stop by name if CONTAINER_NAME is set
    if [ -n "${CONTAINER_NAME:-}" ] && [ -z "${CONTAINER_ID:-}" ]; then
        info "Stopping container ${CONTAINER_NAME}..."
        podman stop "$CONTAINER_NAME" >/dev/null 2>&1 || true
    fi
}

# Set up cleanup trap
trap podman_cleanup EXIT INT TERM
'''
script.main = "err 'default main script. define a proper script to skip this one'"
script.post = ""

# -------------------------------------------------------------------

[tasks.init-podman-volumes]
description = "Initialize podman volume directories with proper permissions"
script = '''
# Check if directories exist with wrong permissions
if [ -d "container-target" ] && [ ! -w "container-target" ]; then
    echo "WARNING: container-target exists but is not writable by current user."
    echo "You may need to run: sudo chown -R $(id -u):$(id -g) container-target"
    echo "Or remove it with: sudo rm -rf container-target"
fi

# Create directories if they don't exist
# Podman will respect the ownership if directories already exist
for dir in container-target podman_cargo/git podman_cargo/registry; do
    if [ ! -d "$dir" ]; then
        mkdir -p "$dir"
        echo "Created directory: $dir"
    fi
done

# Set permissions to ensure they're accessible
chmod -R 755 container-target podman_cargo 2>/dev/null || true
'''

# -------------------------------------------------------------------

[tasks.compute-image-tag]
description = "Compute image tag from version vars"
script = '''
TAG=$(./.utils/get-ci-image-tag.sh)
echo "CARGO_MAKE_IMAGE_TAG=$TAG"
export CARGO_MAKE_IMAGE_TAG=$TAG
'''
# -------------------------------------------------------------------

[tasks.get-podman-hash]
description = "Get the current CONTAINER_DIR_HASH"
script_runner = "bash"
script = '''
HASH=$(./.utils/get-container-hash.sh)
echo "CONTAINER_DIR_HASH=$HASH"
'''

[tasks.ensure-image-exists]
description = "Ensure the image exists locally or on a registry before building"
# This task checks if the required image exists locally or on a registry.
# If not found, it triggers the build-image task to build from test_environment.
dependencies = ["init-podman-volumes"]
extend = "base-script"
script.main = '''
if ! podman image inspect ${IMAGE_NAME}:${TAG} > /dev/null 2>&1; then
  warn "Image not found locally. Attempting to pull..."
  if podman pull ${IMAGE_NAME}:${TAG}; then
    info "Image ${IMAGE_NAME}:${TAG} pulled successfully."
  else
    warn "Image not found on registry. Building image..."
    makers build-image
  fi
else
  info "Image ${IMAGE_NAME}:${TAG} already exists locally."
fi
'''

# -------------------------------------------------------------------

[tasks.build-image]
description = "Build the container image for testing artifacts"
# Note: This task builds the container image from the test_environment directory,
# which contains the Dockerfile and entrypoint.sh for the CI/test environment.
# The build context is set to test_environment to keep paths simple.
script_runner = "bash"
extend = "base-script"
script.main = '''
set -euo pipefail

# Create target directory with correct ownership before podman creates it as root
mkdir -p target

TARGET=$(resolve_build_target "$ZCASH_VERSION" "$ZEBRA_VERSION")

# For local builds, use the current user's UID/GID to avoid permission issues
# CI builds will use the default UID=1001 from the Dockerfile

info "Building image"
info "Tag: ${TAG}"
info "Target: $TARGET"
info "Current directory: $(pwd)"
info "Files in .utils/: $(ls -la .utils/ | head -5)"

cd test_environment && \
podman build -f Dockerfile \
  --target "$TARGET" \
  --build-arg ZCASH_VERSION=$ZCASH_VERSION \
  --build-arg ZEBRA_VERSION=$ZEBRA_VERSION \
  --build-arg RUST_VERSION=$RUST_VERSION \
  --build-arg UID=$(id -u) \
  --build-arg GID=$(id -g) \
  -t ${IMAGE_NAME}:$TAG \
  ${@} \
  .
'''

# -------------------------------------------------------------------

[tasks.push-image]
description = "Push image if running in CI"
# condition = { env_set = ["CI"] }
dependencies = ["ensure-image-exists"]
script_runner = "bash"
extend = "base-script"
script.main = '''
set -euo pipefail

info "Pushing image: ${IMAGE_NAME}:$TAG"

podman push ${IMAGE_NAME}:$TAG
'''

# -------------------------------------------------------------------

[tasks.container-test]
clear = true
description = "Run integration tests using the local image"
# This task runs tests inside the container built from test_environment.
# The entrypoint.sh script in the container sets up test binaries (zcashd, zebrad, zcash-cli)
# by creating symlinks from /home/container_user/artifacts to the expected test_binaries/bins location.
dependencies = ["init-podman-volumes", "ensure-image-exists"]
script_runner = "bash"
extend = "base-script"
script.main = '''
set -euo pipefail

info "Running tests using:"
info "-- IMAGE             = ${IMAGE_NAME}"
info "-- TAG               = $TAG"
# info "-- TEST_BINARIES_DIR = ${TEST_BINARIES_DIR}"

# Create directories with correct ownership before podman creates them as root
mkdir -p container-target podman_cargo/git podman_cargo/registry

# Set container name for cleanup
CONTAINER_NAME="zaino-testing"

# Run podman in foreground with proper signal handling
podman run --rm \
  --userns=keep-id \
  --init \
  --name "$CONTAINER_NAME" \
  -v "$PWD":/home/container_user/zaino \
  -v "$PWD/container-target":/home/container_user/zaino/target \
  -v "$PWD/podman_cargo/git":/usr/local/cargo/git \
  -v "$PWD/podman_cargo/registry":/usr/local/cargo/registry \
  -e "TEST_BINARIES_DIR=${TEST_BINARIES_DIR}" \
  -e "NEXTEST_EXPERIMENTAL_LIBTEST_JSON=1" \
  -e "CARGO_TARGET_DIR=/home/container_user/zaino/target" \
  -e "ZAINOLOG_FORMAT=${ZAINOLOG_FORMAT:-stream}" \
  -e "RUST_LOG=${RUST_LOG:-}" \
  -w /home/container_user/zaino \
  -u container_user \
  "${IMAGE_NAME}:$TAG" \
  cargo nextest run "${@}" &

# Capture the background job PID
PODMAN_PID=$!

# Wait for the podman process
wait $PODMAN_PID
'''
script.post = "makers notify"

