extend = [
    { path = ".utils/makefiles/lints.toml" },
    { path = ".utils/makefiles/notify.toml" },
    { path = ".utils/makefiles/rocksdb.toml" },
]
env_files = [".env.testing-artifacts"]

[config]
default_to_workspace = false

[env]
IMAGE_NAME = "zingodevops/zaino-ci"
TEST_BINARIES_DIR = "/home/container_user/artifacts"

