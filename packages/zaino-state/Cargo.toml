[package]
name = "zaino-state"
description = "A mempool and chain-fetching service built on top of zebra's ReadStateService and TrustedChainSync."
authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
version = "0.1.0"

[features]
default = []

# test_dependencies - Exposes internal functionality for testing.
test_dependencies = []

# **Experimental and alpha features**
# Exposes the **complete** set of experimental / alpha features currently implemented in Zaino.
experimental_features = ["transparent_address_history_experimental"]

# Activates transparent address history capability in zaino
#
# NOTE: currently this is only implemented in the finalised state.
transparent_address_history_experimental = []

[dependencies]
zaino-common = { workspace = true }
zaino-fetch = { workspace = true }
zaino-proto = { workspace = true }

# LibRustZcash
incrementalmerkletree = { workspace = true }
zcash_address = { workspace = true }
zcash_keys = { workspace = true, features = ["sapling"] }
zcash_primitives = { workspace = true }
zcash_protocol = { workspace = true }
zcash_transparent = { workspace = true }
sapling-crypto = "0.5.0"

# Zebra
zebra-chain = { workspace = true }
zebra-state = { workspace = true }
zebra-rpc = { workspace = true }

# Tracing
tracing = { workspace = true }

# Documentation
simple-mermaid = "0.2.0"

# Miscellaneous Workspace
tokio = { workspace = true, features = ["full"] }
thiserror = { workspace = true }
tower = { workspace = true, features = ["buffer", "util"] }
async-trait = { workspace = true }
chrono = { workspace = true }
indexmap = { workspace = true }
hex = { workspace = true, features = ["serde"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
futures = { workspace = true }
tonic = { workspace = true }
dashmap = { workspace = true }
lmdb = { workspace = true }
lmdb-sys = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["preserve_order"] }
prost = { workspace = true }
primitive-types = { workspace = true }
blake2 = { workspace = true }
sha2 = { workspace = true }
corez = { workspace = true }
bs58 = { workspace = true }
nonempty = { workspace = true }
arc-swap = { workspace = true }
reqwest.workspace = true
bitflags = { workspace = true }
derive_more = { workspace = true, features = ["from"] }

[dev-dependencies]
tempfile = { workspace = true }
tracing-subscriber = { workspace = true }
once_cell = { workspace = true }
zebra-chain = { workspace = true, features = ["proptest-impl"] }
proptest.workspace = true
incrementalmerkletree = "0.8.2"
rand = "0.9.4"

[build-dependencies]
whoami = { workspace = true }
