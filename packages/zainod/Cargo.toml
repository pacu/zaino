[package]
name = "zainod"
description = "Crate containing the Zaino Indexer binary."
authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
version = "0.4.0"

[[bin]]
name = "zainod"
path = "src/main.rs"

[lib]
name = "zainodlib"
path = "src/lib.rs"

[features]
default = ["zcashd_support"]

# Support for connecting to a zcashd validator node. Default-on; being
# deprecated. Forwards to the zaino libs. Build with `--no-default-features`
# to compile zcashd out end-to-end. See
# docs/adr/0001-zcashd-support-feature-gate.md.
zcashd_support = [
  "zaino-fetch/zcashd_support",
  "zaino-state/zcashd_support",
  "zaino-serve/zcashd_support",
]

# Removes network restrictions.
no_tls_use_unencrypted_traffic = ["zaino-serve/no_tls_use_unencrypted_traffic"]

# Operator build: no TLS + Prometheus metrics endpoint.
no_tls_with_prometheus = ["no_tls_use_unencrypted_traffic", "prometheus"]

# Prometheus /metrics scrape endpoint.
prometheus = ["metrics", "metrics-exporter-prometheus", "zaino-state/prometheus"]

# DANGER: allows the JSON-RPC server to bind to a public (non-private,
# non-loopback) address. The JSON-RPC interface has NO transport encryption and
# is intended for loopback or trusted private networks only. Enabling this
# exposes unencrypted RPC to whatever network the bind address reaches. Only use
# for deployments on trusted private networks (e.g. containers behind a
# mesh/proxy that terminates encryption).
allow_unencrypted_public_json_rpc_bind = []

# **Experimental and alpha features**
# Exposes the **complete** set of experimental / alpha features currently implemented in Zaino.
experimental_features = ["transparent_address_history_experimental"]

# Activates transparent address history capability in zaino
#
# NOTE: currently this is only implemented in the finalised state.
transparent_address_history_experimental = [
  "zaino-state/transparent_address_history_experimental",
  "zaino-serve/transparent_address_history_experimental"
]

[dependencies]
zaino-common = { workspace = true }
zaino-fetch = { workspace = true, default-features = false }
zaino-state = { workspace = true, default-features = false }
zaino-serve = { workspace = true, default-features = false }

# Zebra
zebra-chain = { workspace = true }
zebra-state = { workspace = true }

# Runtime
tokio = { workspace = true, features = ["full"] }

# CLI
clap = { workspace = true, features = ["derive"] }

# Tracing
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter", "time"] }

# Network / RPC
http = { workspace = true }
serde = { workspace = true, features = ["derive"] }

# Metrics (behind "prometheus" feature)
metrics = { workspace = true, optional = true }
metrics-exporter-prometheus = { workspace = true, optional = true }

# Utility
thiserror = { workspace = true }

# Formats
toml = { workspace = true }
config = { workspace = true }
tempfile = { workspace = true }

[dev-dependencies]
zcash_address = { workspace = true }
zcash_protocol = { workspace = true }
